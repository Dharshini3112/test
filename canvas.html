<b>Hash:</b> <span id="hash-code"></span>
<br />
<canvas id="myCanvas" width="200" height="40" style="border: 1px solid #000000"></canvas>

<script>
    // Create the canvas
    let canvas = document.getElementById("myCanvas");
    let ctx = canvas.getContext("2d");

    // Draw shapes
    ctx.fillStyle = "rgb(255,0,255)";
    ctx.beginPath();
    ctx.rect(20, 20, 150, 100);
    ctx.fill();
    ctx.stroke();
    ctx.closePath();
    ctx.beginPath();
    ctx.fillStyle = "rgb(0,255,255)";
    ctx.arc(50, 50, 50, 0, Math.PI * 2, true);
    ctx.fill();
    ctx.stroke();
    ctx.closePath();

    // Draw text and rectangle
    txt = "dharshininagarajan";
    ctx.textBaseline = "top";
    ctx.font = '17px "Arial 17"';
    ctx.textBaseline = "alphabetic";
    ctx.fillStyle = "rgb(255,5,5)";
    ctx.rotate(0.03);
    ctx.fillText(txt, 4, 17);
    ctx.fillStyle = "rgb(155,255,5)";
    ctx.shadowBlur = 8;
    ctx.shadowColor = "blue";
    ctx.fillRect(20, 12, 100, 5);

    // Convert image to base64 text
    let src = canvas.toDataURL();

    // Basic hash function
    let hash = 0;
    for (i = 0; i < src.length; i++) {
        char = src.charCodeAt(i);
        hash = (hash << 5) - hash + char;
        hash = hash & hash;
    }

    // Display the hash
    document.getElementById("hash-code").innerText = hash;
</script>
