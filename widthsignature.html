<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>FPJS Advanced Width Signature Tool</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            background: #f1f3f6;
            color: #2d3436;
        }

        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: #0984e3;
            text-align: center;
            margin-bottom: 5px;
            font-weight: 800;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin: 25px 0;
        }

        .stat-card {
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #dfe6e9;
        }

        .stat-card.highlight {
            border-bottom: 5px solid #0984e3;
            background: #e3f2fd;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 900;
            color: #2d3436;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .stat-label {
            font-size: 10px;
            color: #636e72;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 13px;
        }

        th,
        td {
            padding: 10px 15px;
            text-align: left;
            border-bottom: 1px solid #f1f2f6;
        }

        th {
            background: #f9f9fb;
            color: #636e72;
            text-transform: uppercase;
        }

        .status-tag {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-yes {
            background: #55efc4;
            color: #006266;
        }

        .status-no {
            background: #f1f2f6;
            color: #636e72;
        }

        .sig-value {
            font-family: 'Consolas', monospace;
            color: #0984e3;
            font-weight: bold;
        }

        button {
            background: #0984e3;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            width: 100%;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            transition: 0.2s;
        }

        button:hover {
            background: #0873c4;
        }

        #log {
            margin-top: 15px;
            font-family: monospace;
            font-size: 11px;
            color: #b2bec3;
            height: 80px;
            overflow-y: auto;
            background: #2d3436;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>Font Width Signature Tool</h1>
        <p style="text-align: center; color: #636e72; margin-bottom: 20px;">
            Extracting unique pixel-level signatures for <b>52 FPJS Fonts</b>.
        </p>

        <button onclick="runAllTests()">Generate Width Signature</button>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="count-detected">-</div>
                <div class="stat-label">Detected Fonts</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="time-batch">-</div>
                <div class="stat-label">Execution Time</div>
            </div>
            <div class="stat-card highlight">
                <div class="stat-value" id="sig-hash" style="font-size: 16px;">-</div>
                <div class="stat-label">Final Width Hash</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="canvas-status">-</div>
                <div class="stat-label">Canvas Entropy</div>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>FONT NAME</th>
                    <th>DOM STATUS</th>
                    <th>CANVAS MATCH</th>
                    <th>WIDTH SIGNATURE (W x H)</th>
                    <th>IDENTIFIER</th>
                </tr>
            </thead>
            <tbody id="result-body">
                <!-- Data injected here -->
            </tbody>
        </table>

        <div id="log">Ready for signature generation...</div>
    </div>

    <script>
        const FPJS_FONTS = [
            "sans-serif-thin", "ARNO PRO", "Agency FB", "Arabic Typesetting", "Arial Unicode MS", "AvantGarde Bk BT", "BankGothic Md BT", "Batang", "Bitstream Vera Sans Mono", "Calibri", "Century", "Century Gothic", "Clarendon", "EUROSTILE", "Franklin Gothic", "Futura Bk BT", "Futura Md BT", "GOTHAM", "Gill Sans", "HELV", "Haettenschweiler", "Helvetica Neue", "Humanst521 BT", "Leelawadee", "Letter Gothic", "Levenim MT", "Lucida Bright", "Lucida Sans", "Menlo", "MS Mincho", "MS Outlook", "MS Reference Specialty", "MS UI Gothic", "MT Extra", "MYRIAD PRO", "Marlett", "Meiryo UI", "Microsoft Uighur", "Minion Pro", "Monotype Corsiva", "PMingLiU", "Pristina", "SCRIPTINA", "Segoe UI Light", "Serifa", "SimHei", "Small Fonts", "Staccato222 BT", "TRAJAN PRO", "Univers CE 55 Medium", "Vrinda", "ZWAdobeF"
        ];

        const BASE_FONTS = ['monospace', 'sans-serif', 'serif'];
        const TEST_STRING = '한국어😃🔒'; // Your custom string

        function log(msg) {
            document.getElementById('log').innerHTML += `> ${msg}<br>`;
        }

        // Simple hash function to create the final signature
        function generateHash(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString(36).toUpperCase();
        }

        async function runAllTests() {
            log("Extracting pixel measurements...");
            const batchStart = performance.now();
            const detectedData = {};
            const container = document.createElement('div');
            container.style.cssText = "visibility:hidden; position:absolute; left:-10000px; font-size:72px;";
            const body = document.body;

            const baseSpans = BASE_FONTS.map(b => {
                const s = document.createElement('span');
                s.style.fontFamily = b;
                s.textContent = TEST_STRING;
                container.appendChild(s);
                return s;
            });

            const fontMap = {};
            FPJS_FONTS.forEach(f => {
                fontMap[f] = BASE_FONTS.map(b => {
                    const s = document.createElement('span');
                    s.style.fontFamily = `'${f}', ${b}`;
                    s.textContent = TEST_STRING;
                    container.appendChild(s);
                    return s;
                });
            });

            body.appendChild(container);
            const refs = BASE_FONTS.map((b, i) => ({ w: baseSpans[i].offsetWidth, h: baseSpans[i].offsetHeight }));

            FPJS_FONTS.forEach(f => {
                const spans = fontMap[f];
                const matchIndex = spans.findIndex((s, i) => s.offsetWidth !== refs[i].w || s.offsetHeight !== refs[i].h);

                if (matchIndex !== -1) {
                    // [CONCEPT] Capture exact pixel width signature
                    detectedData[f] = {
                        w: spans[matchIndex].offsetWidth,
                        h: spans[matchIndex].offsetHeight,
                        base: BASE_FONTS[matchIndex]
                    };
                }
            });
            body.removeChild(container);
            const batchEnd = performance.now();

            // Canvas Measurements
            const canvasDetectedArr = [];
            const cv = document.createElement('canvas');
            const ctx = cv.getContext('2d');
            if (ctx) {
                BASE_FONTS.forEach(base => {
                    ctx.font = `72px ${base}`;
                    const baseW = ctx.measureText(TEST_STRING).width;
                    FPJS_FONTS.forEach(f => {
                        ctx.font = `72px '${f}', ${base}`;
                        const testW = ctx.measureText(TEST_STRING).width;
                        if (testW !== baseW) canvasDetectedArr.push(f);
                    });
                });
            }

            // --- RENDER TABLE ---
            const tbody = document.getElementById('result-body');
            tbody.innerHTML = '';
            let fullSigString = "";

            FPJS_FONTS.forEach(font => {
                const data = detectedData[font];
                const inCV = canvasDetectedArr.includes(font);
                const sig = data ? `${data.w}x${data.h}` : "N/A";
                if (data) fullSigString += font + sig;

                const row = `<tr>
                <td style="font-weight: 700;">${font}</td>
                <td><span class="status-tag ${data ? 'status-yes' : 'status-no'}">${data ? 'Detected' : 'Missing'}</span></td>
                <td><span class="status-tag ${inCV ? 'status-yes' : 'status-no'}">${inCV ? 'Matched' : 'Unmatched'}</span></td>
                <td class="sig-value">${sig}</td>
                <td style="font-size: 11px; color: #7f8c8d;">${data ? 'OS/Rendering Signal' : '-'}</td>
            </tr>`;
                tbody.insertAdjacentHTML('beforeend', row);
            });

            // Update Stats
            document.getElementById('count-detected').textContent = Object.keys(detectedData).length;
            document.getElementById('time-batch').textContent = `${(batchEnd - batchStart).toFixed(1)}ms`;
            document.getElementById('sig-hash').textContent = generateHash(fullSigString);
            document.getElementById('canvas-status').textContent = canvasDetectedArr.length > 0 ? "High" : "Low";

            log(`Signature Generated. Hash: ${generateHash(fullSigString)}`);
        }
    </script>

</body>

</html>
