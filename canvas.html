<!DOCTYPE html>
<html>

<body>

    <canvas id="myCanvas" width="300" height="300" style="border:1px solid black;">
    </canvas>

    <script>
        const canvas = document.getElementById("myCanvas");
        const ctx = canvas.getContext("2d");

        ctx.fillStyle = "red";
        ctx.fillRect(50, 50, 100, 100);
    </script>

</body>

</html>
